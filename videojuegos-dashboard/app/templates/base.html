<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Videojuegos Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <h1>🎮 Videojuegos Dashboard</h1>
            </div>
            <ul class="navbar-menu">
                <li><a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Inicio</a></li>
                <li><a href="/analytics" class="nav-link {% if request.path == '/analytics' %}active{% endif %}">Análisis</a></li>
                <li><a href="/games" class="nav-link {% if request.path == '/games' %}active{% endif %}">Videojuegos</a></li>
                <li><a href="/api-docs" class="nav-link {% if request.path == '/api-docs' %}active{% endif %}">API Docs</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2024 Dashboard de Videojuegos. Todos los derechos reservados.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
